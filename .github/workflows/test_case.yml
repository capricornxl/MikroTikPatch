name: Only for a test
on:
  # push:
  #   branches: [ "main" ]
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CUSTOM_DICT_DATA: ${{ secrets.CUSTOM_DICT_DATA }}

jobs:
  Set_BuildTime:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_buildtime.outputs.BUILD_TIME }}
    steps:
      - name: Set build time
        id: set_buildtime
        run: echo "BUILD_TIME=$(date +'%s')" >> $GITHUB_OUTPUT

  Patch_RouterOS:
    needs: Set_BuildTime
    runs-on: ubuntu-22.04
    strategy:
      matrix:
#        arch: [x86,arm64]
        arch: [x86]
#        channel: [stable, testing]
        channel: [stable]
    env:
      TZ: 'Asia/Shanghai'
      LATEST_VERSION: ""
      ARCH: ""

    steps:
    - name: Get secrets
      id: get_latest
      run: |
        echo "${{ secrets.CUSTOM_DICT_DATA }}" > CUSTOM_DICT_DATA
        cat CUSTOM_DICT_DATA
